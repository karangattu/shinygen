name: Build sandbox images

on:
  push:
    branches:
      - main
    paths:
      - "src/shinygen/dockerfiles/**"
      - ".github/workflows/build-sandbox-images.yml"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Tag the build as :latest (default true)"
        required: false
        default: "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-sandbox-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: shinygen-sandbox-python
            dockerfile: src/shinygen/dockerfiles/Dockerfile.python
          - name: shinygen-sandbox-r
            dockerfile: src/shinygen/dockerfiles/Dockerfile.r
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' || inputs.push_latest == 'true' }}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: src/shinygen/dockerfiles
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:buildcache
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:buildcache,mode=max

      - name: Smoke test pulled image
        run: |
          set -euxo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}" bash -lc 'set -e; which claude; which codex; claude --version || true; codex --version || true'
