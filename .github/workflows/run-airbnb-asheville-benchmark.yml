name: Run Asheville Airbnb benchmark

on:
  workflow_dispatch:

env:
  BENCHMARK_PROMPT: >-
    Build a professional-grade Shiny dashboard featuring an interactive map and comparative performance metrics to visualize how property type and neighborhood dynamics influence pricing and ratings across Asheville.
  BENCHMARK_DATASET: test_data_csv_files/airbnb-asheville-short.csv
  BENCHMARK_FRAMEWORK: shiny_python
  BENCHMARK_JUDGE_MODEL: anthropic/claude-sonnet-4-6
  BENCHMARK_MAX_ITERATIONS: "3"
  BENCHMARK_QUALITY_THRESHOLD: "7.0"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - idx: "01"
            model: claude-opus-4-6
            slug: claude-opus-4-6
          - idx: "02"
            model: claude-sonnet-4-6
            slug: claude-sonnet-4-6
          - idx: "03"
            model: claude-sonnet-4-5
            slug: claude-sonnet-4-5
          - idx: "04"
            model: claude-haiku-4-5
            slug: claude-haiku-4-5
          - idx: "05"
            model: gpt-5.4
            slug: gpt-5.4
          - idx: "06"
            model: gpt-5.4-mini
            slug: gpt-5.4-mini
          - idx: "07"
            model: gpt-5.4-nano
            slug: gpt-5.4-nano
          - idx: "08"
            model: gpt-5.3-codex
            slug: gpt-5.3-codex
    env:
      OUTPUT_DIR: gha_runs/run-${{ github.run_id }}/${{ matrix.idx }}-${{ matrix.slug }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate benchmark inputs and required API key secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "${BENCHMARK_DATASET}" ]]; then
            echo "Missing benchmark dataset: ${BENCHMARK_DATASET}" >&2
            exit 1
          fi

          missing=0
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "Missing required secret: ANTHROPIC_API_KEY" >&2
            missing=1
          fi
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "Missing required secret: OPENAI_API_KEY" >&2
            missing=1
          fi
          if [[ "${missing}" -ne 0 ]]; then
            echo "Configure both repository secrets before running this workflow." >&2
            exit 1
          fi

      - name: Install shinygen and screenshot runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[screenshot]"
          python -m pip install shiny plotly faicons pandas matplotlib seaborn
          python -m playwright install --with-deps chromium

      - name: Run shinygen benchmark generation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIR}"

          shinygen generate \
            --prompt "${BENCHMARK_PROMPT}" \
            --model "${{ matrix.model }}" \
            --framework "${BENCHMARK_FRAMEWORK}" \
            --output "${OUTPUT_DIR}" \
            --csv-file "${BENCHMARK_DATASET}" \
            --screenshot \
            --judge-model "${BENCHMARK_JUDGE_MODEL}" \
            --max-iterations "${BENCHMARK_MAX_ITERATIONS}" \
            --quality-threshold "${BENCHMARK_QUALITY_THRESHOLD}" \
            --web-fetch \
            2>&1 | tee "${OUTPUT_DIR}/run.log"

      - name: Write benchmark metrics summary into output directory
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIR}"

          OUTPUT_DIR="${OUTPUT_DIR}" \
          MODEL="${{ matrix.model }}" \
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          model = os.environ["MODEL"]
          summary_path = output_dir / "run_summary.json"
          metrics_path = output_dir / "run_metrics.txt"

          lines = [
              "shinygen Asheville benchmark summary",
              f"run_id: ${{ github.run_id }}",
              f"run_attempt: ${{ github.run_attempt }}",
              f"workflow: ${{ github.workflow }}",
              f"job: ${{ github.job }}",
              f"model: {model}",
                "timestamp_utc: "
                + datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "",
          ]

          if summary_path.exists():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))
              usage = summary.get("usage") or {}
              lines.extend(
                  [
                      f"passed: {summary.get('passed')}",
                      f"score: {summary.get('score')}",
                      f"iterations: {summary.get('iterations')}",
                      f"generation_cost_usd: {usage.get('generation_cost')}",
                      f"judge_cost_usd: {usage.get('judge_cost')}",
                      f"total_cost_usd: {usage.get('total_cost')}",
                      f"input_tokens: {usage.get('total_input_tokens')}",
                      f"output_tokens: {usage.get('total_output_tokens')}",
                      f"cache_write_tokens: {usage.get('total_cache_write_tokens')}",
                      f"cache_read_tokens: {usage.get('total_cache_read_tokens')}",
                  ]
              )
          else:
              lines.extend(
                  [
                      "run_summary.json: missing",
                      "passed: unknown",
                      "score: unknown",
                      "iterations: unknown",
                      "total_cost_usd: unknown",
                  ]
              )

          metrics_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload per-model benchmark artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shinygen-asheville-benchmark-${{ github.run_id }}-${{ matrix.idx }}-${{ matrix.slug }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: warn

  aggregate:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download all per-model benchmark artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: shinygen-asheville-benchmark-${{ github.run_id }}-*
          path: gha_runs/aggregate-${{ github.run_id }}
          merge-multiple: false

      - name: Build aggregate benchmark summary
        shell: bash
        run: |
          set -euo pipefail
          root="gha_runs/aggregate-${{ github.run_id }}"
          mkdir -p "${root}"

          AGGREGATE_ROOT="${root}" python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["AGGREGATE_ROOT"])
          rows = []
          missing = []

          for artifact_dir in sorted(path for path in root.iterdir() if path.is_dir()):
              summary_paths = sorted(artifact_dir.rglob("run_summary.json"))
              if not summary_paths:
                  missing.append(artifact_dir.name)
                  continue

              summary = json.loads(summary_paths[0].read_text(encoding="utf-8"))
              usage = summary.get("usage") or {}
              model = summary.get("model") or {}
              rows.append(
                  {
                      "artifact_dir": artifact_dir.name,
                      "model": model.get("requested"),
                      "resolved_model_id": model.get("resolved_id"),
                      "agent": model.get("agent"),
                      "passed": summary.get("passed"),
                      "score": summary.get("score"),
                      "iterations": summary.get("iterations"),
                      "total_cost": usage.get("total_cost"),
                      "generation_cost": usage.get("generation_cost"),
                      "judge_cost": usage.get("judge_cost"),
                      "total_input_tokens": usage.get("total_input_tokens"),
                      "total_output_tokens": usage.get("total_output_tokens"),
                  }
              )

          summary_json = {
              "benchmark": "airbnb-asheville-short",
              "prompt": "Build a professional-grade Shiny dashboard featuring an interactive map and comparative performance metrics to visualize how property type and neighborhood dynamics influence pricing and ratings across Asheville.",
              "rows": rows,
              "missing_artifacts": missing,
          }
          (root / "benchmark_summary.json").write_text(
              json.dumps(summary_json, indent=2),
              encoding="utf-8",
          )

          def fmt_cost(value):
              if value is None:
                  return "n/a"
              return f"${value:.4f}"

          def fmt_score(value):
              if value is None:
                  return "n/a"
              return f"{value:.2f}"

          lines = [
              "# Asheville Airbnb benchmark",
              "",
              f"Run ID: ${{ github.run_id }}",
              f"Run attempt: ${{ github.run_attempt }}",
              "",
              "| Model | Agent | Passed | Score | Iterations | Total Cost | Generation Cost | Judge Cost | Input Tokens | Output Tokens | Artifact |",
              "| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |",
          ]

          for row in rows:
              lines.append(
                  "| {model} | {agent} | {passed} | {score} | {iterations} | {total_cost} | {generation_cost} | {judge_cost} | {input_tokens} | {output_tokens} | {artifact_dir} |".format(
                      model=row.get("model") or "n/a",
                      agent=row.get("agent") or "n/a",
                      passed="yes" if row.get("passed") else "no",
                      score=fmt_score(row.get("score")),
                      iterations=row.get("iterations") if row.get("iterations") is not None else "n/a",
                      total_cost=fmt_cost(row.get("total_cost")),
                      generation_cost=fmt_cost(row.get("generation_cost")),
                      judge_cost=fmt_cost(row.get("judge_cost")),
                      input_tokens=row.get("total_input_tokens") if row.get("total_input_tokens") is not None else "n/a",
                      output_tokens=row.get("total_output_tokens") if row.get("total_output_tokens") is not None else "n/a",
                      artifact_dir=row.get("artifact_dir"),
                  )
              )

          if missing:
              lines.extend(
                  [
                      "",
                      "## Missing summaries",
                      "",
                  ]
              )
              lines.extend(f"- {name}" for name in missing)

          (root / "INDEX.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload aggregate benchmark artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shinygen-asheville-benchmark-${{ github.run_id }}-aggregate
          path: gha_runs/aggregate-${{ github.run_id }}
          if-no-files-found: warn