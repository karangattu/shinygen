name: Run shinygen (multi-model parallel)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Natural language description of the app to generate"
        required: true
        type: string
      models:
        description: "Comma or newline separated models (max 8)"
        required: true
        default: "claude-opus, claude-sonnet, gpt54, gpt54-mini, codex-gpt53"
        type: string
      framework:
        description: "Target framework"
        required: true
        default: shiny_python
        type: choice
        options:
          - shiny_python
          - shiny_r
      screenshot:
        description: "Enable screenshot-based visual evaluation"
        required: true
        default: false
        type: boolean
      judge_model:
        description: "Optional judge model"
        required: true
        default: none
        type: choice
        options:
          - none
          - claude-opus
          - claude-sonnet
          - gpt54
          - gpt54-mini
          - codex-gpt53
      max_iterations:
        description: "Maximum generation/judge refinement iterations"
        required: true
        default: "3"
        type: string
      quality_threshold:
        description: "Minimum quality score (1-10) to accept"
        required: true
        default: "7.0"
        type: string
      web_fetch:
        description: "Allow the agent to use web search tools"
        required: true
        default: true
        type: boolean
      verbose:
        description: "Enable verbose logging"
        required: true
        default: false
        type: boolean

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build model matrix (max 8)
        id: build
        shell: bash
        env:
          MODELS: ${{ inputs.models }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          raw = os.environ.get("MODELS", "")
          parts = re.split(r"[\n,]", raw)
          models = [p.strip() for p in parts if p.strip()]

          if not models:
            print("No models provided. Provide at least one model.", file=sys.stderr)
            sys.exit(1)

          if len(models) > 8:
            print(
              f"Too many models ({len(models)}). Max supported in this workflow is 8.",
              file=sys.stderr,
            )
            sys.exit(1)

          if len(set(models)) != len(models):
            print(
              "Duplicate models found. Provide distinct models for parallel comparisons.",
              file=sys.stderr,
            )
            sys.exit(1)

          include = []
          for idx, model in enumerate(models, start=1):
            slug = re.sub(r"[^a-zA-Z0-9._-]+", "-", model).strip("-").lower()
            if not slug:
              slug = f"model-{idx}"
            include.append({"idx": idx, "model": model, "slug": slug[:64]})

          matrix = json.dumps({"include": include})
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"matrix={matrix}\n")
          PY

  run:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    env:
      OUTPUT_DIR: gha_runs/run-${{ github.run_id }}/${{ matrix.idx }}-${{ matrix.slug }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SHINYGEN_SANDBOX_PYTHON_IMAGE: ghcr.io/${{ github.repository_owner }}/shinygen-sandbox-python:latest
      SHINYGEN_SANDBOX_R_IMAGE: ghcr.io/${{ github.repository_owner }}/shinygen-sandbox-r:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate required API key secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "Missing required secret: ANTHROPIC_API_KEY" >&2
            missing=1
          fi
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "Missing required secret: OPENAI_API_KEY" >&2
            missing=1
          fi
          if [[ "${missing}" -ne 0 ]]; then
            echo "Configure both repository secrets before running this workflow." >&2
            exit 1
          fi

      - name: Log in to GHCR (for pulling pre-built sandbox images)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-pull pre-built sandbox image
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.framework }}" == "shiny_python" ]]; then
            image="${SHINYGEN_SANDBOX_PYTHON_IMAGE}"
          else
            image="${SHINYGEN_SANDBOX_R_IMAGE}"
          fi
          echo "Pulling sandbox image: ${image}"
          docker pull "${image}" || echo "::warning::Failed to pull ${image}; compose will build from Dockerfile."

      - name: Install shinygen
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run shinygen generate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIR}"

          cmd=(
            shinygen generate
            --prompt "${{ inputs.prompt }}"
            --model "${{ matrix.model }}"
            --framework "${{ inputs.framework }}"
            --output "${OUTPUT_DIR}"
            --max-iterations "${{ inputs.max_iterations }}"
            --quality-threshold "${{ inputs.quality_threshold }}"
          )

          if [[ "${{ inputs.screenshot }}" == "true" ]]; then
            cmd+=(--screenshot)
          else
            cmd+=(--no-screenshot)
          fi

          if [[ "${{ inputs.web_fetch }}" == "true" ]]; then
            cmd+=(--web-fetch)
          else
            cmd+=(--no-web-fetch)
          fi

          if [[ "${{ inputs.verbose }}" == "true" ]]; then
            cmd+=(--verbose)
          fi

          if [[ "${{ inputs.judge_model }}" != "none" ]]; then
            cmd+=(--judge-model "${{ inputs.judge_model }}")
          fi

          "${cmd[@]}" 2>&1 | tee "${OUTPUT_DIR}/run.log"

      - name: Write metrics summary into output directory
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIR}"

          {
            echo "shinygen run summary"
            echo "run_id: ${{ github.run_id }}"
            echo "run_attempt: ${{ github.run_attempt }}"
            echo "workflow: ${{ github.workflow }}"
            echo "job: ${{ github.job }}"
            echo "model: ${{ matrix.model }}"
            echo "matrix_index: ${{ matrix.idx }}"
            echo "timestamp_utc: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "timing:"
            grep -E '^  Time:' "${OUTPUT_DIR}/run.log" || echo "  Time: not found in run.log"
            echo
            echo "tokens:"
            grep -E '^  Tokens:' "${OUTPUT_DIR}/run.log" || echo "  Tokens: not found in run.log"
            echo
            echo "cost:"
            grep -E '^  Cost:|^    \[total\]' "${OUTPUT_DIR}/run.log" || echo "  Cost: not found in run.log"
          } > "${OUTPUT_DIR}/run_metrics.txt"

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shinygen-run-${{ github.run_id }}-${{ matrix.idx }}-${{ matrix.slug }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: warn

  aggregate:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download all per-model artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: shinygen-run-${{ github.run_id }}-*
          path: gha_runs/aggregate-${{ github.run_id }}
          merge-multiple: false

      - name: Build aggregate index
        shell: bash
        run: |
          set -euo pipefail
          root="gha_runs/aggregate-${{ github.run_id }}"
          mkdir -p "${root}"
          index="${root}/INDEX.txt"
          {
            echo "shinygen multi-model aggregate"
            echo "run_id: ${{ github.run_id }}"
            echo "run_attempt: ${{ github.run_attempt }}"
            echo "workflow: ${{ github.workflow }}"
            echo "timestamp_utc: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "included_artifact_dirs:"
            find "${root}" -mindepth 1 -maxdepth 1 -type d | sort || true
          } > "${index}"

      - name: Upload aggregate artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shinygen-run-${{ github.run_id }}-aggregate
          path: gha_runs/aggregate-${{ github.run_id }}
          if-no-files-found: warn
