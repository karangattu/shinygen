name: Run dataset benchmark matrix

on:
  workflow_dispatch:
    inputs:
      challenge:
        description: "Optional short benchmark label used in artifact names and summaries"
        required: true
        default: ""
      dataset:
        description: "Bundled CSV dataset from test_data_csv_files/"
        required: true
        default: "airbnb-asheville-short.csv"
        type: choice
        options:
          - airbnb-asheville-short.csv
          - air_quality.csv
          - ed_operations.csv
          - ev_charging_stations.csv
          - supply_chain.csv
          - trials_short_50.csv
      benchmark_prompt:
        description: "Prompt passed to shinygen generate for every matrix entry"
        required: true
        default: >-
          Build a professional-grade Shiny dashboard for the selected dataset with clear summary metrics, well-labeled visualizations, and thoughtful interactions that help users compare important patterns in the data.
      quality_threshold:
        description: "Minimum quality score"
        required: true
        default: "7.0"
      max_iterations:
        description: "Max iteration count"
        required: true
        default: "3"

concurrency:
  group: benchmark-${{ github.workflow }}-${{ inputs.challenge || 'benchmark' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  # Panel of judges. Each entry produces one --judge-model flag, and the
  # generator averages per-criterion scores across the panel. Keep this in
  # sync with the README docs in any update.
  BENCHMARK_JUDGE_MODELS: |
    anthropic/claude-sonnet-4-6
    openai/gpt-5.4-mini-2026-03-17
  BENCHMARK_EXPECTED_FRAMEWORKS: |
    shiny_python
    shiny_r
  BENCHMARK_EXPECTED_MODELS: |
    claude-opus-4-6
    claude-opus-4-7
    claude-sonnet-4-6
    gpt-5.4
    gpt-5.4-mini
    gpt-5.4-nano
    gpt-5.5
  BENCHMARK_EXPECTED_ARMS: |
    skills
    vanilla
  BENCHMARK_MAX_ITERATIONS: ${{ inputs.max_iterations || '3' }}
  BENCHMARK_QUALITY_THRESHOLD: ${{ inputs.quality_threshold || '7.0' }}
  SHINYGEN_REQUIRE_SCREENSHOTS_FOR_JUDGE: "1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      benchmark_challenge: ${{ steps.normalize.outputs.benchmark_challenge }}
      benchmark_dataset: ${{ steps.normalize.outputs.benchmark_dataset }}
      benchmark_dataset_basename: ${{ steps.normalize.outputs.benchmark_dataset_basename }}
      benchmark_dataset_stem: ${{ steps.normalize.outputs.benchmark_dataset_stem }}
      benchmark_prompt: ${{ steps.normalize.outputs.benchmark_prompt }}
      benchmark_slug: ${{ steps.normalize.outputs.benchmark_slug }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize benchmark inputs
        id: normalize
        shell: bash
        env:
          RAW_BENCHMARK_PROMPT: ${{ inputs.benchmark_prompt }}
          RAW_CHALLENGE: ${{ inputs.challenge }}
          RAW_DATASET: ${{ inputs.dataset }}
        run: |
          set -euo pipefail

          dataset_input="${RAW_DATASET#./}"
          if [[ "${dataset_input}" != test_data_csv_files/* ]]; then
            dataset_path="test_data_csv_files/${dataset_input}"
          else
            dataset_path="${dataset_input}"
          fi

          if [[ ! "${dataset_path}" =~ ^test_data_csv_files/.+\.csv$ ]]; then
            echo "Dataset must point to a CSV inside test_data_csv_files/." >&2
            exit 1
          fi

          if [[ ! -f "${dataset_path}" ]]; then
            echo "Missing benchmark dataset: ${dataset_path}" >&2
            exit 1
          fi

          dataset_basename="$(basename "${dataset_path}")"
          dataset_stem="${dataset_basename%.csv}"

          challenge="${RAW_CHALLENGE}"
          if [[ -z "$(printf '%s' "${challenge}" | tr -d '[:space:]')" ]]; then
            challenge="${dataset_stem}"
          fi

          if [[ -z "$(printf '%s' "${RAW_BENCHMARK_PROMPT}" | tr -d '[:space:]')" ]]; then
            echo "Benchmark prompt must not be empty." >&2
            exit 1
          fi

          benchmark_slug="$(printf '%s' "${challenge}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"
          if [[ -z "${benchmark_slug}" ]]; then
            benchmark_slug="${dataset_stem}"
          fi

          {
            echo "benchmark_challenge=${challenge}"
            echo "benchmark_dataset=${dataset_path}"
            echo "benchmark_dataset_basename=${dataset_basename}"
            echo "benchmark_dataset_stem=${dataset_stem}"
            echo "benchmark_slug=${benchmark_slug}"
            echo "benchmark_prompt<<EOF"
            printf '%s\n' "${RAW_BENCHMARK_PROMPT}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  run:
    needs: prepare
    runs-on: ubuntu-latest
    # Bumped from 120 → 150 after run 24787647185: claude-opus-4-7+skills hit
    # the hard 2h job timeout, was canceled, and uploaded no run_summary.json
    # (so its row was lost from the aggregate). 150 min keeps headroom over
    # the 25-min sandbox time_limit × 3 iterations + judging + screenshotting.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        framework:
          - shiny_python
          - shiny_r
        model:
          - idx: "01"
            name: claude-opus-4-6
          - idx: "02"
            name: claude-opus-4-7
          - idx: "03"
            name: claude-sonnet-4-6
          - idx: "04"
            name: gpt-5.4
          - idx: "05"
            name: gpt-5.4-mini
          - idx: "06"
            name: gpt-5.4-nano
          - idx: "07"
            name: gpt-5.5
        # Control / treatment axis: each (framework, model) cell runs twice,
        # once with the bundled shinygen skill (`skills`) and once vanilla
        # (`vanilla`). Both arms keep web search enabled so the comparison
        # isolates the skill's contribution.
        arm:
          - name: skills
            use_skills: "true"
          - name: vanilla
            use_skills: "false"
    env:
      BENCHMARK_CHALLENGE: ${{ needs.prepare.outputs.benchmark_challenge }}
      BENCHMARK_DATASET: ${{ needs.prepare.outputs.benchmark_dataset }}
      BENCHMARK_DATASET_BASENAME: ${{ needs.prepare.outputs.benchmark_dataset_basename }}
      BENCHMARK_PROMPT: ${{ needs.prepare.outputs.benchmark_prompt }}
      BENCHMARK_SLUG: ${{ needs.prepare.outputs.benchmark_slug }}
      OUTPUT_DIR: gha_runs/run-${{ github.run_id }}/${{ needs.prepare.outputs.benchmark_slug }}/${{ matrix.framework }}/${{ matrix.model.idx }}-${{ matrix.model.name }}-${{ matrix.arm.name }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SHINYGEN_SANDBOX_PYTHON_IMAGE: ghcr.io/${{ github.repository_owner }}/shinygen-sandbox-python:latest
      SHINYGEN_SANDBOX_R_IMAGE: ghcr.io/${{ github.repository_owner }}/shinygen-sandbox-r:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Validate benchmark inputs and required API key secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "${BENCHMARK_DATASET}" ]]; then
            echo "Missing benchmark dataset: ${BENCHMARK_DATASET}" >&2
            exit 1
          fi

          missing=0
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "Missing required secret: ANTHROPIC_API_KEY" >&2
            missing=1
          fi
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "Missing required secret: OPENAI_API_KEY" >&2
            missing=1
          fi
          if [[ "${missing}" -ne 0 ]]; then
            echo "Configure both repository secrets before running this workflow." >&2
            exit 1
          fi

      - name: Log in to GHCR (for pulling pre-built sandbox images)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-pull pre-built sandbox image
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.framework }}" == "shiny_python" ]]; then
            image="${SHINYGEN_SANDBOX_PYTHON_IMAGE}"
          else
            image="${SHINYGEN_SANDBOX_R_IMAGE}"
          fi
          echo "Pulling sandbox image: ${image}"
          docker pull "${image}" || echo "::warning::Failed to pull ${image}; compose will build from Dockerfile."

      - name: Install shinygen CLI on runner
        shell: bash
        run: |
          set -euo pipefail
          # Install with [screenshot] extras so the host-side screenshot
          # fallback in iterate.py can capture an image when the in-sandbox
          # screenshot is missing (e.g. agent SIGTERMed mid-run).
          python -m pip install -e ".[screenshot]"
          python -m playwright install --with-deps chromium
          # Runtime deps so the fallback can actually start the generated
          # app on the runner. Shiny-R apps have R + system Shiny baked
          # into the sandbox image only, so host-side fallback for R
          # is best-effort and will gracefully degrade to code-only judging.
          if [[ "${{ matrix.framework }}" == "shiny_python" ]]; then
            python -m pip install \
              shiny shinyswatch plotly faicons pandas matplotlib seaborn \
              shinywidgets great-tables itables htmltools folium pydeck \
              lonboard geopandas numpy
          fi

      - name: Run shinygen benchmark generation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIR}"

          # Build one --judge-model flag per non-empty line in BENCHMARK_JUDGE_MODELS.
          judge_args=()
          while IFS= read -r line; do
            line="${line//[$'\t\r ']/}"
            [[ -z "${line}" ]] && continue
            judge_args+=(--judge-model "${line}")
          done <<< "${BENCHMARK_JUDGE_MODELS}"

          shinygen generate \
            --prompt "${BENCHMARK_PROMPT}" \
            --model "${{ matrix.model.name }}" \
            --framework "${{ matrix.framework }}" \
            --output "${OUTPUT_DIR}" \
            --csv-file "${BENCHMARK_DATASET}" \
            --screenshot \
            "${judge_args[@]}" \
            --max-iterations "${BENCHMARK_MAX_ITERATIONS}" \
            --quality-threshold "${BENCHMARK_QUALITY_THRESHOLD}" \
            --web-fetch \
            $([[ "${{ matrix.arm.use_skills }}" == "true" ]] && echo "--skills" || echo "--no-skills") \
            2>&1 | tee "${OUTPUT_DIR}/run.log"

      - name: Write benchmark metrics summary into output directory
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIR}"

          OUTPUT_DIR="${OUTPUT_DIR}" \
          MODEL="${{ matrix.model.name }}" \
          FRAMEWORK="${{ matrix.framework }}" \
          ARM="${{ matrix.arm.name }}" \
          GHA_RUN_ID="${{ github.run_id }}" \
          GHA_RUN_ATTEMPT="${{ github.run_attempt }}" \
          GHA_WORKFLOW="${{ github.workflow }}" \
          GHA_JOB="${{ github.job }}" \
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          model = os.environ["MODEL"]
          framework = os.environ["FRAMEWORK"]
          arm = os.environ["ARM"]
          summary_path = output_dir / "run_summary.json"
          metrics_path = output_dir / "run_metrics.txt"

          lines = [
              "shinygen benchmark summary",
              f"run_id: {os.environ['GHA_RUN_ID']}",
              f"run_attempt: {os.environ['GHA_RUN_ATTEMPT']}",
              f"workflow: {os.environ['GHA_WORKFLOW']}",
              f"job: {os.environ['GHA_JOB']}",
              f"benchmark_challenge: {os.environ['BENCHMARK_CHALLENGE']}",
              f"benchmark_dataset: {os.environ['BENCHMARK_DATASET']}",
              f"model: {model}",
              f"framework: {framework}",
              f"arm: {arm}",
              "timestamp_utc: "
              + datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "",
          ]

          if summary_path.exists():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))
              usage = summary.get("usage") or {}
              judge_models = summary.get("judge_models") or (
                  [summary.get("judge_model")] if summary.get("judge_model") else []
              )
              lines.extend(
                  [
                      f"passed: {summary.get('passed')}",
                      f"score: {summary.get('score')}",
                      f"iterations: {summary.get('iterations')}",
                      f"judge_models: {','.join(judge_models) if judge_models else 'none'}",
                      f"generation_cost_usd: {usage.get('generation_cost')}",
                      f"judge_cost_usd: {usage.get('judge_cost')}",
                      f"total_cost_usd: {usage.get('total_cost')}",
                      f"input_tokens: {usage.get('total_input_tokens')}",
                      f"output_tokens: {usage.get('total_output_tokens')}",
                      f"cache_write_tokens: {usage.get('total_cache_write_tokens')}",
                      f"cache_read_tokens: {usage.get('total_cache_read_tokens')}",
                  ]
              )
          else:
              lines.extend(
                  [
                      "run_summary.json: missing",
                      "passed: unknown",
                      "score: unknown",
                      "iterations: unknown",
                      "total_cost_usd: unknown",
                  ]
              )

          metrics_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload per-model benchmark artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shinygen-${{ needs.prepare.outputs.benchmark_slug }}-${{ github.run_id }}-${{ matrix.framework }}-${{ matrix.model.idx }}-${{ matrix.model.name }}-${{ matrix.arm.name }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: warn

  aggregate:
    needs:
      - prepare
      - run
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BENCHMARK_CHALLENGE: ${{ needs.prepare.outputs.benchmark_challenge }}
      BENCHMARK_DATASET: ${{ needs.prepare.outputs.benchmark_dataset }}
      BENCHMARK_PROMPT: ${{ needs.prepare.outputs.benchmark_prompt }}
      BENCHMARK_SLUG: ${{ needs.prepare.outputs.benchmark_slug }}
      BENCHMARK_EXPECTED_FRAMEWORKS: |
        shiny_python
        shiny_r
      BENCHMARK_EXPECTED_MODELS: |
        claude-opus-4-6
        claude-opus-4-7
        claude-sonnet-4-6
        gpt-5.4
        gpt-5.4-mini
        gpt-5.4-nano
        gpt-5.5
      BENCHMARK_EXPECTED_ARMS: |
        skills
        vanilla
    steps:
      - name: Download all per-model benchmark artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: shinygen-${{ needs.prepare.outputs.benchmark_slug }}-${{ github.run_id }}-*
          path: gha_runs/aggregate-${{ github.run_id }}
          merge-multiple: false

      - name: Build aggregate benchmark summary
        shell: bash
        run: |
          set -euo pipefail
          root="gha_runs/aggregate-${{ github.run_id }}"
          mkdir -p "${root}"

          AGGREGATE_ROOT="${root}" \
          GHA_RUN_ID="${{ github.run_id }}" \
          GHA_RUN_ATTEMPT="${{ github.run_attempt }}" \
          BENCHMARK_CHALLENGE="${BENCHMARK_CHALLENGE}" \
          BENCHMARK_DATASET="${BENCHMARK_DATASET}" \
          BENCHMARK_PROMPT="${BENCHMARK_PROMPT}" \
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["AGGREGATE_ROOT"])
          rows = []
          missing = []

          def env_lines(name):
              return [
                line.strip()
                for line in os.environ.get(name, "").splitlines()
                if line.strip()
              ]

          expected_frameworks = env_lines("BENCHMARK_EXPECTED_FRAMEWORKS")
          expected_models = env_lines("BENCHMARK_EXPECTED_MODELS")
          expected_arms = env_lines("BENCHMARK_EXPECTED_ARMS")

          for artifact_dir in sorted(path for path in root.iterdir() if path.is_dir()):
              summary_paths = sorted(artifact_dir.rglob("run_summary.json"))
              if not summary_paths:
                  missing.append(artifact_dir.name)
                  continue

              summary = json.loads(summary_paths[0].read_text(encoding="utf-8"))
              usage = summary.get("usage") or {}
              model = summary.get("model") or {}
              judge_models = summary.get("judge_models") or (
                  [summary.get("judge_model")] if summary.get("judge_model") else []
              )
              rows.append(
                  {
                      "artifact_dir": artifact_dir.name,
                      "framework": summary.get("framework"),
                      "model": model.get("requested"),
                      "resolved_model_id": model.get("resolved_id"),
                      "agent": model.get("agent"),
                      "arm": summary.get("arm"),
                      "use_skills": summary.get("use_skills"),
                      "web_fetch": summary.get("web_fetch"),
                      "judge_models": judge_models,
                      "passed": summary.get("passed"),
                      "score": summary.get("score"),
                      "iterations": summary.get("iterations"),
                      "screenshot_count": len(summary.get("screenshots") or []),
                      "total_cost": usage.get("total_cost"),
                      "generation_cost": usage.get("generation_cost"),
                      "judge_cost": usage.get("judge_cost"),
                      "total_input_tokens": usage.get("total_input_tokens"),
                      "total_output_tokens": usage.get("total_output_tokens"),
                  }
              )

          expected_cells = {
              (framework, model, arm)
              for framework in expected_frameworks
              for model in expected_models
              for arm in expected_arms
          }
          observed_cells = {
              (row.get("framework"), row.get("model"), row.get("arm"))
              for row in rows
          }
          missing_matrix_cells = [
              {"framework": framework, "model": model, "arm": arm}
              for framework, model, arm in sorted(expected_cells - observed_cells)
          ]

          summary_json = {
              "benchmark": os.environ["BENCHMARK_CHALLENGE"],
              "dataset": os.environ["BENCHMARK_DATASET"],
              "prompt": os.environ["BENCHMARK_PROMPT"],
              "rows": rows,
              "missing_artifacts": missing,
              "missing_matrix_cells": missing_matrix_cells,
              "expected_matrix": {
                "frameworks": expected_frameworks,
                "models": expected_models,
                "arms": expected_arms,
              },
              "totals": {
                  "total_cost": sum(r.get("total_cost") or 0 for r in rows),
                  "generation_cost": sum(r.get("generation_cost") or 0 for r in rows),
                  "judge_cost": sum(r.get("judge_cost") or 0 for r in rows),
                  "total_input_tokens": sum(r.get("total_input_tokens") or 0 for r in rows),
                  "total_output_tokens": sum(r.get("total_output_tokens") or 0 for r in rows),
              },
          }
          (root / "benchmark_summary.json").write_text(
              json.dumps(summary_json, indent=2),
              encoding="utf-8",
          )

          def fmt_cost(value):
              if value is None:
                  return "n/a"
              return f"${value:.4f}"

          def fmt_score(value):
              if value is None:
                  return "n/a"
              return f"{value:.2f}"

          lines = [
              f"# Benchmark: {os.environ['BENCHMARK_CHALLENGE']}",
              "",
              f"Dataset: {os.environ['BENCHMARK_DATASET']}",
              "",
              f"Run ID: {os.environ['GHA_RUN_ID']}",
              f"Run attempt: {os.environ['GHA_RUN_ATTEMPT']}",
              "",
              "| Framework | Model | Agent | Arm | Passed | Score | Iterations | Screenshots | Total Cost | Generation Cost | Judge Cost | Input Tokens | Output Tokens | Artifact |",
              "| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |",
          ]

          for row in rows:
              lines.append(
                "| {framework} | {model} | {agent} | {arm} | {passed} | {score} | {iterations} | {screenshot_count} | {total_cost} | {generation_cost} | {judge_cost} | {input_tokens} | {output_tokens} | {artifact_dir} |".format(
                  framework=row.get("framework") or "n/a",
                      model=row.get("model") or "n/a",
                      agent=row.get("agent") or "n/a",
                      arm=row.get("arm") or "n/a",
                      passed="yes" if row.get("passed") else "no",
                      score=fmt_score(row.get("score")),
                      iterations=row.get("iterations") if row.get("iterations") is not None else "n/a",
                      screenshot_count=row.get("screenshot_count", 0),
                      total_cost=fmt_cost(row.get("total_cost")),
                      generation_cost=fmt_cost(row.get("generation_cost")),
                      judge_cost=fmt_cost(row.get("judge_cost")),
                      input_tokens=row.get("total_input_tokens") if row.get("total_input_tokens") is not None else "n/a",
                      output_tokens=row.get("total_output_tokens") if row.get("total_output_tokens") is not None else "n/a",
                      artifact_dir=row.get("artifact_dir"),
                  )
              )

          # Compute totals across all rows
          benchmark_total_cost = sum(r.get("total_cost") or 0 for r in rows)
          benchmark_gen_cost = sum(r.get("generation_cost") or 0 for r in rows)
          benchmark_judge_cost = sum(r.get("judge_cost") or 0 for r in rows)
          benchmark_input_tokens = sum(r.get("total_input_tokens") or 0 for r in rows)
          benchmark_output_tokens = sum(r.get("total_output_tokens") or 0 for r in rows)

          lines.append(
              "| **Total** | | | | | | | | **{total_cost}** | **{generation_cost}** | **{judge_cost}** | **{input_tokens}** | **{output_tokens}** | |".format(
                  total_cost=fmt_cost(benchmark_total_cost),
                  generation_cost=fmt_cost(benchmark_gen_cost),
                  judge_cost=fmt_cost(benchmark_judge_cost),
                  input_tokens=benchmark_input_tokens,
                  output_tokens=benchmark_output_tokens,
              )
          )

          # ----------------------------------------------------------------
          # Skills (treatment) vs vanilla (control) delta per (framework, model)
          # ----------------------------------------------------------------
          def fmt_delta(value):
              if value is None:
                  return "n/a"
              sign = "+" if value > 0 else ("" if value == 0 else "-")
              return f"{sign}{abs(value):.2f}"

          def fmt_pct(value):
              if value is None:
                  return "n/a"
              sign = "+" if value > 0 else ("" if value == 0 else "-")
              return f"{sign}{abs(value):.1f}%"

          pairs: dict[tuple[str, str], dict[str, dict]] = {}
          for row in rows:
              framework = row.get("framework") or "n/a"
              model = row.get("model") or "n/a"
              arm = row.get("arm") or "n/a"
              if arm not in {"skills", "vanilla"}:
                  continue
              pairs.setdefault((framework, model), {})[arm] = row

          arm_comparison = []
          for (framework, model), arms in sorted(pairs.items()):
              skills = arms.get("skills") or {}
              vanilla = arms.get("vanilla") or {}
              skills_score = skills.get("score")
              vanilla_score = vanilla.get("score")
              delta = (
                  skills_score - vanilla_score
                  if skills_score is not None and vanilla_score is not None
                  else None
              )
              pct = (
                  (delta / vanilla_score * 100.0)
                  if delta is not None and vanilla_score not in (None, 0)
                  else None
              )
              if delta is None:
                  winner = "incomplete pair"
              elif delta > 0.05:
                  winner = "skills"
              elif delta < -0.05:
                  winner = "vanilla"
              else:
                  winner = "tie"
              skills_cost = skills.get("total_cost")
              vanilla_cost = vanilla.get("total_cost")
              cost_delta = (
                  skills_cost - vanilla_cost
                  if skills_cost is not None and vanilla_cost is not None
                  else None
              )
              arm_comparison.append(
                  {
                      "framework": framework,
                      "model": model,
                      "skills_score": skills_score,
                      "vanilla_score": vanilla_score,
                      "score_delta": delta,
                      "score_delta_pct": pct,
                      "skills_passed": skills.get("passed"),
                      "vanilla_passed": vanilla.get("passed"),
                      "skills_iterations": skills.get("iterations"),
                      "vanilla_iterations": vanilla.get("iterations"),
                      "skills_total_cost": skills_cost,
                      "vanilla_total_cost": vanilla_cost,
                      "cost_delta": cost_delta,
                      "winner": winner,
                  }
              )

          summary_json["arm_comparison"] = arm_comparison
          (root / "benchmark_summary.json").write_text(
              json.dumps(summary_json, indent=2),
              encoding="utf-8",
          )

          if arm_comparison:
              lines.extend(
                  [
                      "",
                      "## Skills vs vanilla delta (per model)",
                      "",
                      "Positive `Δ score` means the bundled skill helped that model on this benchmark.",
                      "",
                      "| Framework | Model | Skills score | Vanilla score | Δ score | Δ % | Winner | Δ cost | Skills passed | Vanilla passed |",
                      "| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |",
                  ]
              )
              skills_wins = 0
              vanilla_wins = 0
              ties = 0
              deltas: list[float] = []
              for item in arm_comparison:
                  if item["winner"] == "skills":
                      skills_wins += 1
                  elif item["winner"] == "vanilla":
                      vanilla_wins += 1
                  elif item["winner"] == "tie":
                      ties += 1
                  if item["score_delta"] is not None:
                      deltas.append(item["score_delta"])
                  lines.append(
                      "| {framework} | {model} | {skills_score} | {vanilla_score} | {delta} | {pct} | {winner} | {cost_delta} | {skills_passed} | {vanilla_passed} |".format(
                          framework=item["framework"],
                          model=item["model"],
                          skills_score=fmt_score(item["skills_score"]),
                          vanilla_score=fmt_score(item["vanilla_score"]),
                          delta=fmt_delta(item["score_delta"]),
                          pct=fmt_pct(item["score_delta_pct"]),
                          winner=item["winner"],
                          cost_delta=(
                              fmt_cost(item["cost_delta"])
                              if item["cost_delta"] is not None
                              else "n/a"
                          ),
                          skills_passed="yes" if item["skills_passed"] else ("no" if item["skills_passed"] is not None else "n/a"),
                          vanilla_passed="yes" if item["vanilla_passed"] else ("no" if item["vanilla_passed"] is not None else "n/a"),
                      )
                  )

              mean_delta = sum(deltas) / len(deltas) if deltas else None
              lines.extend(
                  [
                      "",
                      "**Arm scoreboard:** "
                      f"skills wins = {skills_wins}, vanilla wins = {vanilla_wins}, ties = {ties}, "
                      f"mean Δ score = {fmt_delta(mean_delta)} (n={len(deltas)})",
                  ]
              )

          if missing:
              lines.extend(
                  [
                      "",
                      "## Missing summaries",
                      "",
                  ]
              )
              lines.extend(f"- {name}" for name in missing)

          if missing_matrix_cells:
              lines.extend(
                  [
                      "",
                      "## Missing matrix cells",
                      "",
                  ]
              )
              for cell in missing_matrix_cells:
                  lines.append(
                      f"- {cell['framework']} / {cell['model']} / {cell['arm']}"
                  )

          (root / "INDEX.md").write_text("\n".join(lines) + "\n", encoding="utf-8")

          validation_messages = []
          if missing:
              validation_messages.append(
                  "Missing benchmark artifact summaries: " + ", ".join(missing)
              )
          if missing_matrix_cells:
              validation_messages.append(
                  "Missing benchmark matrix cells: "
                  + ", ".join(
                      f"{cell['framework']}/{cell['model']}/{cell['arm']}"
                      for cell in missing_matrix_cells
                  )
              )
          if validation_messages:
              (root / "benchmark_validation_failed.txt").write_text(
                  "\n".join(validation_messages) + "\n",
                  encoding="utf-8",
              )
          PY

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" && -f "${root}/INDEX.md" ]]; then
            cat "${root}/INDEX.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

          if [[ -f "${root}/benchmark_validation_failed.txt" ]]; then
            cat "${root}/benchmark_validation_failed.txt" >&2
            exit 1
          fi

      - name: Upload aggregate benchmark artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shinygen-${{ needs.prepare.outputs.benchmark_slug }}-${{ github.run_id }}-aggregate
          path: gha_runs/aggregate-${{ github.run_id }}
          if-no-files-found: warn